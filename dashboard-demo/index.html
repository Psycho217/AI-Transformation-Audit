<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziiro — Business Intelligence Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

<div class="wrapper">

    <!-- NAV -->
    <nav class="nav">
        <div class="nav-logo">Ziiro</div>
        <ul class="nav-links">
            <li><a href="#" class="active">Overview</a></li>
            <li><a href="#">Data Source</a></li>
            <li><a href="#">Analytics</a></li>
            <li><a href="#">Predictions</a></li>
            <li><a href="#">Reports</a></li>
            <li><a href="#">Settings</a></li>
        </ul>
        <div class="nav-right">
            <button class="nav-search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
            <button class="theme-toggle" id="theme-toggle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
            <div class="nav-user">
                <div class="nav-avatar">IT</div>
                <div class="nav-user-info">
                    <div class="nav-user-name">Isabella Torres</div>
                    <div class="nav-user-role">CTO</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- TITLE -->
    <h1 class="page-title">Business Overview</h1>

    <!-- CONTENT AREA: Main + Sidebar -->
    <div class="content-area">
        <div class="dashboard-main">
            <!-- KPI Cards -->
            <div id="kpi-cards"></div>

            <!-- Chart -->
            <div class="chart-section">
                <div class="chart-header">
                    <div>
                        <div class="chart-title">Predictive Analytics</div>
                        <div class="chart-subtitle">From January – December 2025</div>
                    </div>
                    <select class="chart-filter">
                        <option>Monthly</option>
                        <option>Weekly</option>
                        <option>Quarterly</option>
                    </select>
                </div>
                <div class="chart-container">
                    <canvas id="chart-canvas"></canvas>
                </div>
            </div>

            <!-- Business Impact -->
            <div id="opportunities"></div>
        </div>

        <!-- SIDEBAR -->
        <aside class="dashboard-sidebar">
            <div id="recommendations"></div>
            <div id="financial-health"></div>
            <div id="integrations"></div>
        </aside>
    </div>

    <!-- BOTTOM GRID -->
    <div class="bottom-grid">
        <div class="bottom-card" id="activity"></div>
        <div class="bottom-card" id="trends"></div>
        <div class="bottom-card" id="goals"></div>
    </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
